name: Build & Release Patched Nekogram ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXTRA_FILE: "TMessagesProj/src/main/java/tw/nekomimi/nekogram/Extra.java"
      GS_FILE: "TMessagesProj/src/main/java/tw/nekomimi/nekogram/settings/NekoGeneralSettingsActivity.java"
      UC_FILE: "TMessagesProj/src/main/java/org/telegram/messenger/UserConfig.java"
      SC_FILE: "TMessagesProj/src/main/java/org/telegram/ui/Stories/StoriesController.java"
      MC_FILE: "TMessagesProj/src/main/java/org/telegram/messenger/MessagesController.java"
      MS_FILE: "TMessagesProj/src/main/java/org/telegram/messenger/MessagesStorage.java"
      TLRPC_FILE: "TMessagesProj/src/main/java/org/telegram/tgnet/TLRPC.java"

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK
        run: sdkmanager "ndk;27.3.13750724"

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Restore google-services.json
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: |
          echo "$FIREBASE_JSON" | base64 -d > TMessagesProj_App/google-services.json
          cp TMessagesProj_App/google-services.json TMessagesProj/google-services.json

      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > TMessagesProj_App/release.jks

      - name: Setup signing config
        run: |
          echo "storeFile=release.jks" >> local.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Inject Telegram API credentials into Extra.java
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          sed -i "s/public static final int APP_ID = 0;/public static final int APP_ID = ${TELEGRAM_API_ID};/" "$EXTRA_FILE"
          sed -i "s/public static final String APP_HASH = \"\";/public static final String APP_HASH = \"${TELEGRAM_API_HASH}\";/" "$EXTRA_FILE"
          echo "--- Verification ---"
          grep "APP_ID\|APP_HASH" "$EXTRA_FILE"

      - name: Apply Extra patches (Feature Patching)
        run: |
          # 1. Config & UI Dashboard Setup (Java-side)
          
          # Add mod logic to Extra.java (All Toggles + Restart)
          sed -i '/public class Extra {/a \    private static android.content.SharedPreferences getSP() { return org.telegram.messenger.ApplicationLoader.applicationContext.getSharedPreferences("NekoModConfig", 0); }\n    public static boolean isAdsDisabled() { return getSP().getBoolean("noAds", false); }\n    public static void toggleAds() { getSP().edit().putBoolean("noAds", !isAdsDisabled()).apply(); }\n    public static boolean isSecretGhostEnabled() { return getSP().getBoolean("secG", false); }\n    public static void toggleSecretGhost() { getSP().edit().putBoolean("secG", !isSecretGhostEnabled()).apply(); }\n    public static boolean isScreenshotsEnabled() { return getSP().getBoolean("scrn", false); }\n    public static void toggleScreenshots() { getSP().edit().putBoolean("scrn", !isScreenshotsEnabled()).apply(); }\n    public static boolean isAntiDeleteEnabled() { return getSP().getBoolean("aDel", false); }\n    public static void toggleAntiDelete() { getSP().edit().putBoolean("aDel", !isAntiDeleteEnabled()).apply(); }\n    public static boolean isStealthStoriesEnabled() { return getSP().getBoolean("sSto", false); }\n    public static void toggleStealthStories() { getSP().edit().putBoolean("sSto", !isStealthStoriesEnabled()).apply(); }\n    public static boolean isPremiumEnabled() { return getSP().getBoolean("prem", false); }\n    public static void togglePremium() { getSP().edit().putBoolean("prem", !isPremiumEnabled()).apply(); }\n    public static boolean isNoForwardsBypassed() { return getSP().getBoolean("nFor", false); }\n    public static void toggleNoForwardsBypass() { getSP().edit().putBoolean("nFor", !isNoForwardsBypassed()).apply(); }\n    public static boolean isRestrictedContentEnabled() { return getSP().getBoolean("rCon", false); }\n    public static void toggleRestrictedContent() { getSP().edit().putBoolean("rCon", !isRestrictedContentEnabled()).apply(); }\n    public static void restartApp() { var ctx = org.telegram.messenger.ApplicationLoader.applicationContext; var intent = ctx.getPackageManager().getLaunchIntentForPackage(ctx.getPackageName()); var pendingIntent = android.app.PendingIntent.getActivity(ctx, 1234, intent, android.app.PendingIntent.FLAG_CANCEL_CURRENT | (android.os.Build.VERSION.SDK_INT >= 23 ? 0x04000000 : 0)); ((android.app.AlarmManager) ctx.getSystemService(android.content.Context.ALARM_SERVICE)).set(android.app.AlarmManager.RTC, System.currentTimeMillis() + 100, pendingIntent); System.exit(0); }' "$EXTRA_FILE"
          
          # Add UI Toggles & Restart to NekoGeneralSettingsActivity
          # Row IDs
          sed -i '/private final int openArchiveOnPullRow/a \    private final int magicShadowRow = rowId++;\n    private final int magicHeaderRow = rowId++;\n    private final int antiDeleteRow = rowId++;\n    private final int stealthStoriesRow = rowId++;\n    private final int premiumRow = rowId++;\n    private final int adsRow = rowId++;\n    private final int secretRow = rowId++;\n    private final int screenshotRow = rowId++;\n    private final int noForwardsRow = rowId++;\n    private final int restrictedContentRow = rowId++;\n    private final int restartRow = rowId++;' "$GS_FILE"
          # Item Filling
          sed -i '/items.add(UItem.asCheck(openArchiveOnPullRow/a \        items.add(UItem.asShadow(null));\n        items.add(UItem.asHeader("Raman\x27s Magic"));\n        items.add(UItem.asCheck(antiDeleteRow, "Anti-Delete Messages").setChecked(tw.nekomimi.nekogram.Extra.isAntiDeleteEnabled()));\n        items.add(UItem.asCheck(stealthStoriesRow, "Stealth Mode for Stories").setChecked(tw.nekomimi.nekogram.Extra.isStealthStoriesEnabled()));\n        items.add(UItem.asCheck(premiumRow, "Unlock Premium Features").setChecked(tw.nekomimi.nekogram.Extra.isPremiumEnabled()));\n        items.add(UItem.asCheck(adsRow, "Disable Sponsored Content").setChecked(tw.nekomimi.nekogram.Extra.isAdsDisabled()));\n        items.add(UItem.asCheck(secretRow, "Secret Media Ghost Mode").setChecked(tw.nekomimi.nekogram.Extra.isSecretGhostEnabled()));\n        items.add(UItem.asCheck(screenshotRow, "Allow Screenshots everywhere").setChecked(tw.nekomimi.nekogram.Extra.isScreenshotsEnabled()));\n        items.add(UItem.asCheck(noForwardsRow, "Ignore Channel Restrictions").setChecked(tw.nekomimi.nekogram.Extra.isNoForwardsBypassed()));\n        items.add(UItem.asCheck(restrictedContentRow, "Access Restricted Content").setChecked(tw.nekomimi.nekogram.Extra.isRestrictedContentEnabled()));\n        items.add(UItem.asButton(restartRow, "Restart App (To apply some changes)"));' "$GS_FILE"
          # Click Handling
          sed -i '/else if (id == openArchiveOnPullRow) {/i \        } else if (id == antiDeleteRow) {\n            tw.nekomimi.nekogram.Extra.toggleAntiDelete();\n            if (view instanceof org.telegram.ui.Cells.TextCheckCell) ((org.telegram.ui.Cells.TextCheckCell) view).setChecked(tw.nekomimi.nekogram.Extra.isAntiDeleteEnabled());\n        } else if (id == stealthStoriesRow) {\n            tw.nekomimi.nekogram.Extra.toggleStealthStories();\n            if (view instanceof org.telegram.ui.Cells.TextCheckCell) ((org.telegram.ui.Cells.TextCheckCell) view).setChecked(tw.nekomimi.nekogram.Extra.isStealthStoriesEnabled());\n        } else if (id == premiumRow) {\n            tw.nekomimi.nekogram.Extra.togglePremium();\n            if (view instanceof org.telegram.ui.Cells.TextCheckCell) ((org.telegram.ui.Cells.TextCheckCell) view).setChecked(tw.nekomimi.nekogram.Extra.isPremiumEnabled());\n        } else if (id == adsRow) {\n            tw.nekomimi.nekogram.Extra.toggleAds();\n            if (view instanceof org.telegram.ui.Cells.TextCheckCell) ((org.telegram.ui.Cells.TextCheckCell) view).setChecked(tw.nekomimi.nekogram.Extra.isAdsDisabled());\n        } else if (id == secretRow) {\n            tw.nekomimi.nekogram.Extra.toggleSecretGhost();\n            if (view instanceof org.telegram.ui.Cells.TextCheckCell) ((org.telegram.ui.Cells.TextCheckCell) view).setChecked(tw.nekomimi.nekogram.Extra.isSecretGhostEnabled());\n        } else if (id == screenshotRow) {\n            tw.nekomimi.nekogram.Extra.toggleScreenshots();\n            if (view instanceof org.telegram.ui.Cells.TextCheckCell) ((org.telegram.ui.Cells.TextCheckCell) view).setChecked(tw.nekomimi.nekogram.Extra.isScreenshotsEnabled());\n        } else if (id == noForwardsRow) {\n            tw.nekomimi.nekogram.Extra.toggleNoForwardsBypass();\n            if (view instanceof org.telegram.ui.Cells.TextCheckCell) ((org.telegram.ui.Cells.TextCheckCell) view).setChecked(tw.nekomimi.nekogram.Extra.isNoForwardsBypassed());\n        } else if (id == restrictedContentRow) {\n            tw.nekomimi.nekogram.Extra.toggleRestrictedContent();\n            if (view instanceof org.telegram.ui.Cells.TextCheckCell) ((org.telegram.ui.Cells.TextCheckCell) view).setChecked(tw.nekomimi.nekogram.Extra.isRestrictedContentEnabled());\n        } else if (id == restartRow) {\n            tw.nekomimi.nekogram.Extra.restartApp();' "$GS_FILE"

          # 2. Integration Logic (Dynamic Patches)
          
          # --- Premium Consolidation ---
          UC_FILE="TMessagesProj/src/main/java/org/telegram/messenger/UserConfig.java"
          sed -i 's/return user.premium;/return tw.nekomimi.nekogram.Extra.isPremiumEnabled() || user.premium;/' "$UC_FILE"
          SC_FILE="TMessagesProj/src/main/java/org/telegram/ui/Stories/StoriesController.java"
          sed -i 's/private boolean isPremium(long dialogId) {/private boolean isPremium(long dialogId) {\n        if (tw.nekomimi.nekogram.Extra.isPremiumEnabled()) return true;/' "$SC_FILE"
          sed -i 's/public final boolean isPremiumFeatureAvailable(int feature) {/public final boolean isPremiumFeatureAvailable(int feature) {\n        if (tw.nekomimi.nekogram.Extra.isPremiumEnabled()) return true;/' "TMessagesProj/src/main/java/org/telegram/messenger/MessagesController.java"

          # --- Ads / Sponsored Messages ---
          MC_FILE="TMessagesProj/src/main/java/org/telegram/messenger/MessagesController.java"
          sed -i 's/public boolean isSponsoredDisabled() {/public boolean isSponsoredDisabled() {\n        if (tw.nekomimi.nekogram.Extra.isAdsDisabled()) return true;/' "$MC_FILE"
          sed -i 's/private void checkPromoInfoInternal(boolean force) {/private void checkPromoInfoInternal(boolean force) {\n        if (tw.nekomimi.nekogram.Extra.isAdsDisabled()) return;/' "$MC_FILE"
          sed -i 's/public boolean isSponsored() {/public boolean isSponsored() {\n        if (tw.nekomimi.nekogram.Extra.isAdsDisabled()) return false;/' "TMessagesProj/src/main/java/org/telegram/messenger/MessageObject.java"

          # --- Secret Media Ghost Mode ---
          sed -i 's/public int getSecretTimeLeft() {/public int getSecretTimeLeft() {\n        if (tw.nekomimi.nekogram.Extra.isSecretGhostEnabled()) return 1;/' "TMessagesProj/src/main/java/org/telegram/messenger/MessageObject.java"
          sed -i 's/public boolean isSecretMedia() {/public boolean isSecretMedia() {\n        if (tw.nekomimi.nekogram.Extra.isSecretGhostEnabled()) return false;/' "TMessagesProj/src/main/java/org/telegram/messenger/MessageObject.java"

          # --- Screenshot Bypass (Master Hook) ---
          sed -i 's/public static boolean isSecuredNow(Window window) {/public static boolean isSecuredNow(Window window) {\n        if (tw.nekomimi.nekogram.Extra.isScreenshotsEnabled()) return false;/' "TMessagesProj/src/main/java/org/telegram/messenger/FlagSecureReason.java"

          # --- Restricted Content ---
          sed -i 's/if (bundle == null || fragment == null) {/if (tw.nekomimi.nekogram.Extra.isRestrictedContentEnabled()) return true; if (bundle == null || fragment == null) {/' "$MC_FILE"
          sed -i 's/isRestrictedMessage = true;/isRestrictedMessage = !tw.nekomimi.nekogram.Extra.isRestrictedContentEnabled();/' "TMessagesProj/src/main/java/org/telegram/messenger/MessageObject.java"

          # --- Global noforwards (Channel Restrictions) ---
          TLRPC_FILE="TMessagesProj/src/main/java/org/telegram/tgnet/TLRPC.java"
          sed -i 's/noforwards = (flags & [0-9]*) != 0;/& if (tw.nekomimi.nekogram.Extra.isNoForwardsBypassed()) noforwards = false;/g' "$TLRPC_FILE"
          sed -i 's/noforwards_my_enabled = hasFlag(flags2, FLAG_22);/& if (tw.nekomimi.nekogram.Extra.isNoForwardsBypassed()) noforwards_my_enabled = false;/g' "$TLRPC_FILE"
          sed -i 's/noforwards_peer_enabled = hasFlag(flags2, FLAG_24);/& if (tw.nekomimi.nekogram.Extra.isNoForwardsBypassed()) noforwards_peer_enabled = false;/g' "$TLRPC_FILE"

          # --- Anti-Delete & Stealth Stories (Already dynamic) ---
          MS_FILE="TMessagesProj/src/main/java/org/telegram/messenger/MessagesStorage.java"
          sed -i 's/private ArrayList<Long> markMessagesAsDeletedInternal(long dialogId, ArrayList<Integer> messages, boolean deleteFiles, int mode, int threadMessageId) {/& \n        if (tw.nekomimi.nekogram.Extra.isAntiDeleteEnabled()) return null;/' "$MS_FILE"
          sed -i 's/private ArrayList<Long> markMessagesAsDeletedInternal(long channelId, int mid, boolean deleteFiles) {/& \n        if (tw.nekomimi.nekogram.Extra.isAntiDeleteEnabled()) return null;/' "$MS_FILE"
          sed -i 's/public boolean markStoryAsRead(long dialogId, TL_stories.StoryItem storyItem) {/& \n        if (tw.nekomimi.nekogram.Extra.isStealthStoriesEnabled()) return false;/' "$SC_FILE"
          sed -i 's/public boolean markStoryAsRead(TL_stories.PeerStories userStories, TL_stories.StoryItem storyItem, boolean profile) {/& \n        if (tw.nekomimi.nekogram.Extra.isStealthStoriesEnabled()) return false;/' "$SC_FILE"

          echo "All patches applied successfully via advanced dynamic sed"

      - name: Verify Raman's Magic (Pre-Build Test)
        run: |
          # 1. Verify Extra.java Logic
          grep -q "isAntiDeleteEnabled" "$EXTRA_FILE" || { echo "FAILED: Extra.java Toggles missing!"; exit 1; }
          grep -q "restartApp" "$EXTRA_FILE" || { echo "FAILED: Restart Logic missing!"; exit 1; }
          
          # 2. Verify UserConfig Premium Toggle
          grep -q "Extra.isPremiumEnabled()" "$UC_FILE" || { echo "FAILED: Premium Toggle in UserConfig missing!"; exit 1; }
          
          # 3. Verify MessagesController Toggles
          grep -q "Extra.isRestrictedContentEnabled()" "$MC_FILE" || { echo "FAILED: Restricted Content Toggle in MessagesController missing!"; exit 1; }
          
          # 4. Verify MessageObject Logic
          grep -q "Extra.isSecretGhostEnabled()" "TMessagesProj/src/main/java/org/telegram/messenger/MessageObject.java" || { echo "FAILED: Secret Media logic missing!"; exit 1; }
          grep -q "Extra.isAdsDisabled()" "TMessagesProj/src/main/java/org/telegram/messenger/MessageObject.java" || { echo "FAILED: Ads logic missing!"; exit 1; }
          
          # 5. Verify Screenshot Bypass
          grep -q "isScreenshotsEnabled()" "TMessagesProj/src/main/java/org/telegram/messenger/FlagSecureReason.java" || { echo "FAILED: Screenshot bypass missing!"; exit 1; }
          
          # 6. Verify TLRPC Bypass
          grep -q "Extra.isNoForwardsBypassed()" "TMessagesProj/src/main/java/org/telegram/tgnet/TLRPC.java" || { echo "FAILED: Global noforwards bypass missing!"; exit 1; }
          
          # 7. Verify UI Header & Dashboard
          grep -q "asShadow(null)" "$GS_FILE" || { echo "FAILED: Shadow Section missing!"; exit 1; }
          grep -q "Raman.s Magic" "$GS_FILE" || { echo "FAILED: Dashboard Header missing!"; exit 1; }
          grep -q "restartRow" "$GS_FILE" || { echo "FAILED: Restart Button missing!"; exit 1; }
          
      - name: Patch colorado cert check for our keystore
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          keytool -exportcert \
            -keystore TMessagesProj_App/release.jks \
            -alias "$KEY_ALIAS" \
            -storepass "$KEYSTORE_PASSWORD" \
            -file /tmp/mycert.der

          python3 - << 'EOF'
          import zlib, re
          data = open('/tmp/mycert.der', 'rb').read()
          size = len(data)
          crc  = zlib.crc32(data) & 0xffffffff
          print(f"Cert size : {size} ({hex(size)})")
          print(f"Cert CRC32: {hex(crc)}")
          h = open('TMessagesProj/jni/colorado/colorado.h').read()
          h = re.sub(r'#define CERT_HASH 0x[0-9a-fA-F]+', f'#define CERT_HASH {hex(crc)}', h)
          h = re.sub(r'#define CERT_SIZE 0x[0-9a-fA-F]+', f'#define CERT_SIZE {hex(size)}', h)
          open('TMessagesProj/jni/colorado/colorado.h', 'w').write(h)
          print("Patched colorado.h successfully")
          EOF

          echo "--- colorado.h ---"
          cat TMessagesProj/jni/colorado/colorado.h

      - name: Fix XML resource strings
        run: |
          python3 - << 'EOF'
          import os, re
          strings_to_fix = [
              "CloudConfigSyncDate", "Gift2ActiveAuctionsActiveBidActive", "Gift2ActiveAuctionsActiveRound",
              "Gift2AuctionInfo2", "Gift2AuctionInfoLearnMore2", "Gift2AuctionInfo", 
              "Gift2AuctionsChangeRecipient2", "Gift2AveragePriceHint", "Gift2InfoOutConverted", 
              "GiftAuctionInfo1Text", "GiftOfferPayMulti", "NotificationTopicExceptionsDesctription",
              "StarRatingDescription1", "StarRatingDescription2", "StarRatingDescription3",
              "StoryAddedToAlbumTitle", "StoryRemovedFromAlbumTitle", "SuggestAPostBelowSubtitleStarsAndTime",
              "SuggestionAgreementReachedAdmin1", "SuggestionAgreementReachedAdmin1PastSimple", "SuggestionAgreementReachedAdmin2",
              "SuggestionAgreementReachedAdmin3Stars", "SuggestionAgreementReachedAdmin3TON", "SuggestionAgreementReachedAdmin4Stars",
              "SuggestionAgreementReachedAdmin4TON", "SuggestionAgreementReachedUser1", "SuggestionAgreementReachedUser1PastSimple",
              "SuggestionAgreementReachedUser3Stars", "SuggestionAgreementReachedUser3TON", "SuggestionAgreementReachedUser4Stars",
              "SuggestionAgreementReachedUser4TON", "UnconfirmedAuthMultipleFrom"
          ]
          suffixes = ["", "_one", "_other", "_few", "_many"]

          def fix_content(content):
              def repl(match):
                  tag, body, end = match.groups()
                  if '%' not in body: return match.group(0)
                  placeholders = re.findall(r'%[^$0-9 \n<%>]*[sdf]', body)
                  if len(placeholders) <= 1: return match.group(0)
                  
                  parts = re.split(r'(%[^$0-9 \n<%>]*[sdf])', body)
                  count = 1
                  for i in range(len(parts)):
                      if re.match(r'%[^$0-9 \n<%>]*[sdf]', parts[i]):
                          parts[i] = '%' + str(count) + '$' + parts[i][1:]
                          count += 1
                  return tag + "".join(parts) + end

              for s in strings_to_fix:
                  for suff in suffixes:
                      name = s + suff
                      pattern = r'(<string name="' + re.escape(name) + r'">)(.*?)(</string>)'
                      content = re.sub(pattern, repl, content, flags=re.DOTALL)
              return content

          res_path = "TMessagesProj/src/main/res"
          for root, dirs, files in os.walk(res_path):
              for file in files:
                  if file.endswith(".xml") and ("strings" in file or "values" in root):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              content = f.read()
                          new_content = fix_content(content)
                          if content != new_content:
                              with open(path, 'w', encoding='utf-8') as f:
                                  f.write(new_content)
                              print(f"Fixed strings in {path}")
                      except Exception as e:
                          print(f"Error processing {path}: {e}")
          EOF

      - name: Configure Gradle
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "sentry.enabled=false" >> gradle.properties

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep -m1 "^APP_VERSION_NAME=" gradle.properties | cut -d'=' -f2 | tr -d '\r\n')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build APK
        run: |
          ./gradlew assembleRelease \
            -PabiFilters=arm64-v8a \
            -x uploadSentryProguardMappingsRelease \
            -x uploadSentryNativeSymbolsForRelease \
            -x sentryBundleSourcesRelease

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find . -name "*arm64*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Nekogram v${{ steps.version.outputs.version }} (Patched)
          body: |
            ✔ ARM64 build
            ✔ Firebase enabled
            ✔ Premium + Extra Patched
          files: ${{ steps.apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
