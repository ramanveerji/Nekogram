name: Build & Release Patched Nekogram ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK
        run: sdkmanager "ndk;27.3.13750724"

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Restore google-services.json
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: |
          echo "$FIREBASE_JSON" | base64 -d > TMessagesProj_App/google-services.json
          cp TMessagesProj_App/google-services.json TMessagesProj/google-services.json

      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.jks"

      - name: Write and run patch script
        run: |
          echo "" | base64 -d > /tmp/patch_signing.py
          python3 /tmp/patch_signing.py TMessagesProj_App/build.gradle
          echo "--- Signing config result ---"
          grep -n "signingConfig\|storeFile\|storePassword\|keyAlias\|keyPassword\|localProperties" TMessagesProj_App/build.gradle || true

      - name: Set NDK version in library build.gradle
        run: |
          FILE="TMessagesProj/build.gradle"
          if ! grep -q "ndkVersion" "$FILE"; then
            awk '
              /android[[:space:]]*\{/ && !injected {
                print
                print "    ndkVersion \"27.3.13750724\""
                injected=1
                next
              }
              { print }
            ' "$FILE" > tmp && mv tmp "$FILE"
          fi

      - name: Inject Telegram API into app build.gradle
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          FILE="TMessagesProj_App/build.gradle"

          if grep -q "TELEGRAM_API_ID" "$FILE"; then
            echo "Already injected, skipping."
          else
            LINE1="        buildConfigField \"int\", \"TELEGRAM_API_ID\", \"${TELEGRAM_API_ID}\""
            LINE2="        buildConfigField \"String\", \"TELEGRAM_API_HASH\", \"\\\"${TELEGRAM_API_HASH}\\\"\""

            awk -v l1="$LINE1" -v l2="$LINE2" '
              !injected && /defaultConfig[[:space:]]*\{/ {
                print
                print l1
                print l2
                injected=1
                next
              }
              { print }
            ' "$FILE" > tmp_build.gradle && mv tmp_build.gradle "$FILE"
          fi

          echo "--- API injection result ---"
          grep -n "TELEGRAM_API\|defaultConfig" "$FILE" || true

      - name: Configure Gradle
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "sentry.enabled=false" >> gradle.properties

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep APP_VERSION_NAME gradle.properties | cut -d'=' -f2 | tr -d '\r\n')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build APK
        run: |
          ./gradlew assembleRelease \
            -PabiFilters=arm64-v8a \
            -PKEYSTORE_PATH="${{ github.workspace }}/release.jks" \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            -x uploadSentryProguardMappingsRelease \
            -x uploadSentryNativeSymbolsForRelease \
            -x sentryBundleSourcesRelease

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find . -name "*arm64*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Nekogram v${{ steps.version.outputs.version }} (Patched)
          body: |
            ✔ ARM64 build
            ✔ Firebase enabled
            ✔ Signed with custom keystore
            ❌ Sentry disabled
          files: ${{ steps.apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}