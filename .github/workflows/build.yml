name: Build & Release Patched Nekogram ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK
        run: sdkmanager "ndk;27.3.13750724"

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Restore google-services.json
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: |
          echo "$FIREBASE_JSON" | base64 -d > TMessagesProj_App/google-services.json
          cp TMessagesProj_App/google-services.json TMessagesProj/google-services.json

      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > TMessagesProj_App/release.jks

      - name: Setup signing config
        run: |
          echo "storeFile=release.jks" >> local.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Inject Telegram API credentials into Extra.java
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          EXTRA="TMessagesProj/src/main/java/tw/nekomimi/nekogram/Extra.java"
          sed -i "s/public static final int APP_ID = 0;/public static final int APP_ID = ${TELEGRAM_API_ID};/" "$EXTRA"
          sed -i "s/public static final String APP_HASH = \"\";/public static final String APP_HASH = \"${TELEGRAM_API_HASH}\";/" "$EXTRA"
          echo "--- Verification ---"
          grep "APP_ID\|APP_HASH" "$EXTRA"

      - name: Apply Extra patches (Feature Patching)
        run: |
          # 1. UserConfig.java isPremium fix
          UC_FILE="TMessagesProj/src/main/java/org/telegram/messenger/UserConfig.java"
          sed -i 's/return user.premium;/return true;/' "$UC_FILE"

          # 2. MessagesController.java patches
          MC_FILE="TMessagesProj/src/main/java/org/telegram/messenger/MessagesController.java"
          # isPremiumFeatureBlocked
          sed -i 's/return premiumLocked && !getUserConfig().isPremium();/return false;/' "$MC_FILE"
          # isChatNoForwards
          sed -i 's/return chat.noforwards;/return false;/' "$MC_FILE"
          # isPeerNoForwards
          sed -i 's/return dialogId > 0 ? isUserNoForwards(dialogId) : isChatNoForwards(-dialogId);/return false;/' "$MC_FILE"
          # isUserNoForwards
          sed -i 's/return isUserNoForwards(getUserFull(userId));/return false;/' "$MC_FILE"
          # premiumLocked initial load
          sed -i 's/premiumLocked = mainPreferences.getBoolean("premiumLocked", false);/premiumLocked = false;/' "$MC_FILE"
          # premiumLocked update
          sed -i 's/premiumLocked = ((TLRPC.TL_jsonBool) value.value).value;/premiumLocked = false;/' "$MC_FILE"
          # checkCanOpenChat bypass
          sed -i 's/if (bundle == null || fragment == null) {/if (true) return true; if (bundle == null || fragment == null) {/' "$MC_FILE"

          # 4. MessageObject.java logic (isRestrictedMessage bypass)
          MO_FILE="TMessagesProj/src/main/java/org/telegram/messenger/MessageObject.java"
          sed -i 's/isRestrictedMessage = true;/isRestrictedMessage = false;/g' "$MO_FILE"

          # 5. Global TLRPC.java noforwards bypass (100% parity with smali)
          TLRPC_FILE="TMessagesProj/src/main/java/org/telegram/tgnet/TLRPC.java"
          sed -i 's/noforwards = (flags & /noforwards = false; \/\/ (flags \& /g' "$TLRPC_FILE"
          sed -i 's/noforwards_my_enabled = /noforwards_my_enabled = false; \/\/ /g' "$TLRPC_FILE"
          sed -i 's/noforwards_peer_enabled = /noforwards_peer_enabled = false; \/\/ /g' "$TLRPC_FILE"

          # 6. Anti-Delete Messages (Java-side implementation with Toggle)
          EXTRA_FILE="TMessagesProj/src/main/java/tw/nekomimi/nekogram/Extra.java"
          MS_FILE="TMessagesProj/src/main/java/org/telegram/messenger/MessagesStorage.java"
          GS_FILE="TMessagesProj/src/main/java/tw/nekomimi/nekogram/settings/NekoGeneralSettingsActivity.java"
          
          # Add storage logic to Extra.java
          sed -i '/public class Extra {/a \    public static boolean isAntiDeleteEnabled() { return org.telegram.messenger.ApplicationLoader.applicationContext.getSharedPreferences("NekoConfig", 0).getBoolean("antiDelete", false); }\n    public static void toggleAntiDelete() { var sp = org.telegram.messenger.ApplicationLoader.applicationContext.getSharedPreferences("NekoConfig", 0); sp.edit().putBoolean("antiDelete", !sp.getBoolean("antiDelete", false)).apply(); }' "$EXTRA_FILE"
          
          # Intercept deletions in MessagesStorage
          sed -i 's/private ArrayList<Long> markMessagesAsDeletedInternal(long dialogId, ArrayList<Integer> messages, boolean deleteFiles, int mode, int threadMessageId) {/private ArrayList<Long> markMessagesAsDeletedInternal(long dialogId, ArrayList<Integer> messages, boolean deleteFiles, int mode, int threadMessageId) {\n        if (tw.nekomimi.nekogram.Extra.isAntiDeleteEnabled()) return null;/' "$MS_FILE"
          sed -i 's/private ArrayList<Long> markMessagesAsDeletedInternal(long channelId, int mid, boolean deleteFiles) {/private ArrayList<Long> markMessagesAsDeletedInternal(long channelId, int mid, boolean deleteFiles) {\n        if (tw.nekomimi.nekogram.Extra.isAntiDeleteEnabled()) return null;/' "$MS_FILE"
          
          # Add UI Toggle to NekoGeneralSettingsActivity
          sed -i '/private final int openArchiveOnPullRow/a \    private final int antiDeleteRow = rowId++;' "$GS_FILE"
          sed -i '/items.add(UItem.asCheck(openArchiveOnPullRow/a \        items.add(UItem.asCheck(antiDeleteRow, "Anti-Delete Messages").setChecked(tw.nekomimi.nekogram.Extra.isAntiDeleteEnabled()));' "$GS_FILE"
          sed -i '/else if (id == openArchiveOnPullRow) {/i \        } else if (id == antiDeleteRow) {\n            tw.nekomimi.nekogram.Extra.toggleAntiDelete();\n            if (view instanceof org.telegram.ui.Cells.TextCheckCell) {\n                ((org.telegram.ui.Cells.TextCheckCell) view).setChecked(tw.nekomimi.nekogram.Extra.isAntiDeleteEnabled());\n            }' "$GS_FILE"

          echo "All patches applied successfully via sed"

      - name: Patch colorado cert check for our keystore
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          keytool -exportcert \
            -keystore TMessagesProj_App/release.jks \
            -alias "$KEY_ALIAS" \
            -storepass "$KEYSTORE_PASSWORD" \
            -file /tmp/mycert.der

          python3 - << 'EOF'
          import zlib, re
          data = open('/tmp/mycert.der', 'rb').read()
          size = len(data)
          crc  = zlib.crc32(data) & 0xffffffff
          print(f"Cert size : {size} ({hex(size)})")
          print(f"Cert CRC32: {hex(crc)}")
          h = open('TMessagesProj/jni/colorado/colorado.h').read()
          h = re.sub(r'#define CERT_HASH 0x[0-9a-fA-F]+', f'#define CERT_HASH {hex(crc)}', h)
          h = re.sub(r'#define CERT_SIZE 0x[0-9a-fA-F]+', f'#define CERT_SIZE {hex(size)}', h)
          open('TMessagesProj/jni/colorado/colorado.h', 'w').write(h)
          print("Patched colorado.h successfully")
          EOF

          echo "--- colorado.h ---"
          cat TMessagesProj/jni/colorado/colorado.h

      - name: Configure Gradle
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "sentry.enabled=false" >> gradle.properties

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep -m1 "^APP_VERSION_NAME=" gradle.properties | cut -d'=' -f2 | tr -d '\r\n')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build APK
        run: |
          ./gradlew assembleRelease \
            -PabiFilters=arm64-v8a \
            -x uploadSentryProguardMappingsRelease \
            -x uploadSentryNativeSymbolsForRelease \
            -x sentryBundleSourcesRelease

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find . -name "*arm64*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Nekogram v${{ steps.version.outputs.version }} (Patched)
          body: |
            ✔ ARM64 build
            ✔ Firebase enabled
            ✔ Premium + Extra Patched
          files: ${{ steps.apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
